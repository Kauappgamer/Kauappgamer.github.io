<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gravador PRO</title>

<style>
  body {
    background: #020617;
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
  }

  h2 {
    margin-bottom: 10px;
  }

  select, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
  }

  button {
    background: #22c55e;
    color: white;
    cursor: pointer;
  }

  .stop {
    background: #ef4444;
  }

  video {
    width: 70%;
    display: none;
    border-radius: 10px;
    background: black;
  }

  #downloadBtn {
    display: none;
    background: #3b82f6;
  }

  .badge {
    color: #22c55e;
    font-size: 12px;
  }
</style>
</head>

<body>

<h2>🎥 Gravador PRO</h2>

<div>
  <label>Qualidade:</label><br>
  <select id="quality">
    <option value="256x144|200000">144p</option>
    <option value="426x240|300000">240p</option>
    <option value="640x360|500000">360p</option>
    <option value="854x480|800000">480p</option>
    <option value="1280x720|2500000" selected>720p (Recomendado)</option>
    <option value="1920x1080|5000000">1080p</option>
  </select>
</div>

<label>
  <input type="checkbox" id="mic">
  Microfone
</label>

<button id="btn">Gravar</button>

<video id="video" controls></video>
<button id="downloadBtn">Salvar</button>

<script>
let recorder, stream;
let chunks = [];

const btn = document.getElementById("btn");
const video = document.getElementById("video");
const downloadBtn = document.getElementById("downloadBtn");
const mic = document.getElementById("mic");
const quality = document.getElementById("quality");

btn.onclick = async () => {
  if (btn.textContent === "Gravar") start();
  else stop();
};

async function start() {
  try {
    const [res, bitrate] = quality.value.split("|");
    const [width, height] = res.split("x");

    const screen = await navigator.mediaDevices.getDisplayMedia({
      video: {
        width: parseInt(width),
        height: parseInt(height),
        frameRate: 30
      },
      audio: true
    });

    let tracks = [...screen.getTracks()];

    if (mic.checked) {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true
        }
      });

      tracks.push(...micStream.getAudioTracks());
    }

    stream = new MediaStream(tracks);

    // 🔥 evita eco
    const hiddenVideo = document.createElement("video");
    hiddenVideo.srcObject = stream;
    hiddenVideo.muted = true;
    hiddenVideo.play();

    recorder = new MediaRecorder(stream, {
      mimeType: "video/webm;codecs=vp8",
      videoBitsPerSecond: parseInt(bitrate)
    });

    chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);

      video.style.display = "block";
      video.src = url;

      downloadBtn.style.display = "block";

      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = "gravacao.webm";
        a.click();
      };
    };

    recorder.start(1000);

    btn.textContent = "Parar";
    btn.classList.add("stop");

  } catch (err) {
    alert("Erro: " + err);
  }
}

function stop() {
  recorder.stop();
  stream.getTracks().forEach(t => t.stop());

  btn.textContent = "Gravar";
  btn.classList.remove("stop");
}
</script>

</body>
</html>

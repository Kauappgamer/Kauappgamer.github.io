<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter Vídeo</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:Arial;
}

.box{
    background:#1e1e1e;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#00b894;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#00a383;
}

#status{
    margin-top:20px;
    color:#ccc;
    word-break:break-word;
}
</style>
</head>
<body>

<div class="box">

<h2>Converter Vídeo</h2>

<input type="file" id="videoInput" accept="video/*">

<br>

<button id="convertBtn">
Converter e Baixar
</button>

<div id="status"></div>

</div>

<script type="module">

import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/esm/index.js';
import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

const ffmpeg = new FFmpeg();

const input = document.getElementById("videoInput");
const btn = document.getElementById("convertBtn");
const status = document.getElementById("status");

let loaded = false;

btn.onclick = async () => {

    const file = input.files[0];

    if(!file){
        alert("Escolha um vídeo.");
        return;
    }

    try{

        status.innerText = "Carregando FFmpeg...";

        if(!loaded){

            const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';

            await ffmpeg.load({

                coreURL: await toBlobURL(
                    `${baseURL}/ffmpeg-core.js`,
                    'text/javascript'
                ),

                wasmURL: await toBlobURL(
                    `${baseURL}/ffmpeg-core.wasm`,
                    'application/wasm'
                )
            });

            loaded = true;
        }

        status.innerText = "Processando vídeo...";

        await ffmpeg.writeFile(
            "input.mp4",
            await fetchFile(file)
        );

        // -10dB = reduz volume
        await ffmpeg.exec([
            '-i',
            'input.mp4',
            '-filter:a',
            'volume=-10dB',
            '-c:v',
            'copy',
            'output.mp4'
        ]);

        const data = await ffmpeg.readFile('output.mp4');

        const url = URL.createObjectURL(
            new Blob([data.buffer], { type: 'video/mp4' })
        );

        const a = document.createElement('a');

        a.href = url;
        a.download = 'video_convertido.mp4';

        document.body.appendChild(a);

        a.click();

        a.remove();

        URL.revokeObjectURL(url);

        status.innerText = "Download concluído.";

    }catch(err){

        console.error(err);

        status.innerText = "Erro ao converter vídeo.";

    }

};

</script>

</body>
</html>

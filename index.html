<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gravador de tela</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}

select, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

.stop { background: #ef4444; }

video {
  width: 70%;
  display: none;
  background: black;
}

#downloadBtn {
  display: none;
  background: #3b82f6;
}
</style>
</head>

<body>

<h2>🎥 Gravador de tela</h2>

<select id="quality">
  <option value="1280x720|2500000" selected>720p</option>
  <option value="1920x1080|5000000">1080p</option>
</select>

<label>
  <input type="checkbox" id="mic"> Microfone
</label>

<button id="btn">Gravar</button>

<video id="video" controls></video>
<button id="downloadBtn">Salvar</button>

<script>
let recorder, stream;
let chunks = [];

const btn = document.getElementById("btn");
const video = document.getElementById("video");
const downloadBtn = document.getElementById("downloadBtn");
const mic = document.getElementById("mic");
const quality = document.getElementById("quality");

btn.onclick = async () => {
  if (btn.textContent === "Gravar") start();
  else stop();
};

async function start() {
  try {
    const [res, bitrate] = quality.value.split("|");
    const [width, height] = res.split("x");

    const screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { width: +width, height: +height, frameRate: 30 },
      audio: true
    });

    const audioContext = new AudioContext();
    const destination = audioContext.createMediaStreamDestination();

    // áudio do sistema
    if (screenStream.getAudioTracks().length > 0) {
      const systemSource = audioContext.createMediaStreamSource(screenStream);
      systemSource.connect(destination);
    }

    // microfone
    if (mic.checked) {
      const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const micSource = audioContext.createMediaStreamSource(micStream);
      micSource.connect(destination);
    }

    // junta vídeo + áudio misturado
    stream = new MediaStream([
      ...screenStream.getVideoTracks(),
      ...destination.stream.getAudioTracks()
    ]);

    recorder = new MediaRecorder(stream, {
      mimeType: "video/webm",
      videoBitsPerSecond: +bitrate
    });

    chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);

      video.style.display = "block";
      video.src = url;

      downloadBtn.style.display = "block";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = "gravacao.webm";
        a.click();
      };
    };

    recorder.start();

    btn.textContent = "Parar";
    btn.classList.add("stop");

  } catch (err) {
    alert("Erro: " + err);
  }
}

function stop() {
  recorder.stop();
  stream.getTracks().forEach(t => t.stop());

  btn.textContent = "Gravar";
  btn.classList.remove("stop");
}
</script>

</body>
</html>

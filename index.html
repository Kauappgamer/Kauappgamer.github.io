<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converter Volume do Vídeo</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#111;
        color:white;
        font-family:Arial;
    }

    .container{
        background:#1e1e1e;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:350px;
    }

    input{
        margin-top:15px;
    }

    button{
        margin-top:20px;
        padding:12px 20px;
        border:none;
        border-radius:10px;
        background:#00b894;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#00a383;
    }

    #status{
        margin-top:20px;
        color:#ccc;
        word-break:break-word;
    }
</style>
</head>
<body>

<div class="container">

    <h2>Converter Vídeo para 50 dB</h2>

    <input type="file" id="videoInput" accept="video/*">

    <br>

    <button id="convertBtn">
        Converter e Baixar
    </button>

    <div id="status"></div>

</div>

<script type="module">

import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm';
import { fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm';

const ffmpeg = new FFmpeg();

const videoInput = document.getElementById("videoInput");
const convertBtn = document.getElementById("convertBtn");
const status = document.getElementById("status");

let loaded = false;

convertBtn.addEventListener("click", async () => {

    const file = videoInput.files[0];

    if(!file){
        alert("Escolha um vídeo.");
        return;
    }

    try{

        status.innerText = "Carregando FFmpeg...";

        if(!loaded){

            await ffmpeg.load({
                coreURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js",
                wasmURL: "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.wasm"
            });

            loaded = true;
        }

        status.innerText = "Enviando vídeo...";

        await ffmpeg.writeFile(
            file.name,
            await fetchFile(file)
        );

        status.innerText = "Convertendo áudio...";

        // volume=50dB aumenta MUITO o som
        // use -10dB para reduzir
        await ffmpeg.exec([
            "-i",
            file.name,
            "-filter:a",
            "volume=-10dB",
            "-c:v",
            "copy",
            "saida.mp4"
        ]);

        status.innerText = "Preparando download...";

        const data = await ffmpeg.readFile("saida.mp4");

        const url = URL.createObjectURL(
            new Blob([data.buffer], { type: "video/mp4" })
        );

        const a = document.createElement("a");

        a.href = url;
        a.download = "video_convertido.mp4";

        document.body.appendChild(a);

        a.click();

        a.remove();

        URL.revokeObjectURL(url);

        status.innerText = "Download concluído.";

    }catch(err){

        console.error(err);

        status.innerText = "Erro ao converter vídeo.";
    }

});

</script>

</body>
</html>

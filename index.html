<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gravador PRO Ultra</title>

<style>
body {
  background: #020617;
  color: white;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 15px;
}

video {
  width: 70%;
  border-radius: 10px;
  background: black;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

button, select, input {
  padding: 8px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: #22c55e;
  color: white;
}

.stop { background: #ef4444; }
#downloadBtn { background: #3b82f6; display:none; }
</style>
</head>

<body>

<h2>🎥 Gravador PRO ULTRA</h2>

<div class="controls">
  <select id="quality">
    <option value="1280x720|2500000">720p</option>
    <option value="1920x1080|5000000">1080p</option>
  </select>

  <label><input type="checkbox" id="mic"> Mic</label>
  <label><input type="checkbox" id="cam"> Câmera</label>

  🎙 Mic Vol <input type="range" id="micVol" min="0" max="2" step="0.1" value="1">
  🔊 Sistema <input type="range" id="sysVol" min="0" max="2" step="0.1" value="1">
</div>

<button id="btn">Gravar</button>

<video id="preview" autoplay muted></video>
<video id="video" controls style="display:none;"></video>

<button id="downloadBtn">Salvar</button>

<script>
let recorder, stream;
let chunks = [];

const btn = document.getElementById("btn");
const preview = document.getElementById("preview");
const video = document.getElementById("video");
const downloadBtn = document.getElementById("downloadBtn");

const mic = document.getElementById("mic");
const cam = document.getElementById("cam");
const micVol = document.getElementById("micVol");
const sysVol = document.getElementById("sysVol");
const quality = document.getElementById("quality");

btn.onclick = () => {
  if (btn.textContent === "Gravar") start();
  else stop();
};

async function start() {
  try {
    const [res, bitrate] = quality.value.split("|");
    const [width, height] = res.split("x");

    const screen = await navigator.mediaDevices.getDisplayMedia({
      video: { width: +width, height: +height, frameRate: 30 },
      audio: true
    });

    const audioContext = new AudioContext();
    const dest = audioContext.createMediaStreamDestination();

    // 🔊 Áudio do sistema
    if (screen.getAudioTracks().length > 0) {
      const sysSource = audioContext.createMediaStreamSource(screen);
      const sysGain = audioContext.createGain();
      sysGain.gain.value = sysVol.value;

      sysSource.connect(sysGain).connect(dest);

      sysVol.oninput = () => sysGain.gain.value = sysVol.value;
    }

    let videoTracks = [...screen.getVideoTracks()];

    // 🎙 Microfone
    if (mic.checked) {
      const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const micSource = audioContext.createMediaStreamSource(micStream);
      const micGain = audioContext.createGain();

      micGain.gain.value = micVol.value;

      micSource.connect(micGain).connect(dest);

      micVol.oninput = () => micGain.gain.value = micVol.value;
    }

    // 📷 Câmera overlay
    if (cam.checked) {
      const camStream = await navigator.mediaDevices.getUserMedia({ video: true });

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");

      const screenVideo = document.createElement("video");
      screenVideo.srcObject = screen;
      screenVideo.play();

      const camVideo = document.createElement("video");
      camVideo.srcObject = camStream;
      camVideo.play();

      function draw() {
        ctx.drawImage(screenVideo, 0, 0, canvas.width, canvas.height);

        // overlay canto inferior direito
        ctx.drawImage(camVideo, canvas.width - 220, canvas.height - 160, 200, 150);

        requestAnimationFrame(draw);
      }

      draw();

      const canvasStream = canvas.captureStream(30);
      videoTracks = canvasStream.getVideoTracks();
    }

    stream = new MediaStream([
      ...videoTracks,
      ...dest.stream.getAudioTracks()
    ]);

    preview.srcObject = stream;

    recorder = new MediaRecorder(stream, {
      mimeType: "video/webm;codecs=vp8,opus",
      videoBitsPerSecond: +bitrate
    });

    chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);

      video.style.display = "block";
      video.src = url;

      downloadBtn.style.display = "block";
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = "gravacao.webm";
        a.click();
      };
    };

    recorder.start(2000);

    btn.textContent = "Parar";
    btn.classList.add("stop");

  } catch (err) {
    alert("Erro: " + err);
  }
}

function stop() {
  recorder.stop();
  stream.getTracks().forEach(t => t.stop());

  btn.textContent = "Gravar";
  btn.classList.remove("stop");
}
</script>

</body>
</html>
